name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            obsidian-plugin/package-lock.json
            vscode-extension/package-lock.json
      
      # Sync version from tag into both components
      - name: Sync Version from Tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Syncing version: $VERSION"
          # Update obsidian-plugin manifest.json
          jq --arg v "$VERSION" '.version = $v' obsidian-plugin/manifest.json > tmp.json && mv tmp.json obsidian-plugin/manifest.json
          # Update obsidian-plugin package.json
          jq --arg v "$VERSION" '.version = $v' obsidian-plugin/package.json > tmp.json && mv tmp.json obsidian-plugin/package.json
          # Update vscode-extension package.json
          jq --arg v "$VERSION" '.version = $v' vscode-extension/package.json > tmp.json && mv tmp.json vscode-extension/package.json

      # Build Obsidian plugin
      - name: Build Obsidian Plugin
        run: |
          cd obsidian-plugin
          npm ci || npm install
          npm run build
      
      # Build VS Code extension
      - name: Build VS Code Extension
        run: |
          cd vscode-extension
          npm ci || npm install
          npm run compile
          npx @vscode/vsce package --allow-missing-repository
      
      # Create plugin zip for easy installation
      - name: Create Plugin Zip
        run: |
          mkdir -p cursor-integration
          cp obsidian-plugin/main.js cursor-integration/
          cp obsidian-plugin/manifest.json cursor-integration/
          zip -r cursor-integration.zip cursor-integration
      
      # Create GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            obsidian-plugin/main.js
            obsidian-plugin/manifest.json
            cursor-integration.zip
            vscode-extension/*.vsix
          generate_release_notes: true
